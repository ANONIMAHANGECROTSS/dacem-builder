name: "Build Flutter APK"

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'ZIP URL'
        required: true
        type: string
      project_name:
        description: 'Project Name'
        required: true
        type: string
      app_name:
        description: 'App Display Name'
        required: false
        type: string
        default: 'DACM App'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          
      - name: Download Source
        run: |
          curl -L -o source.zip "${{ github.event.inputs.source_url }}"
          unzip -o source.zip
          
      - name: Build
        run: |
          RAW="${{ github.event.inputs.project_name }}"
          APP="${{ github.event.inputs.app_name }}"
          PROJ=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr ' -' '_' | tr -cd 'a-z0-9_')
          
          mv "$PROJ" _user 2>/dev/null || mv "$RAW" _user 2>/dev/null
          flutter create --platforms=android --project-name "$PROJ" "$PROJ"
          rm -rf _user/android _user/ios 2>/dev/null
          cp -r _user/* "$PROJ"/ 2>/dev/null
          rm -rf _user
          
          mkdir -p "$PROJ/assets"
          python3 -c "
from PIL import Image
img = Image.new('RGBA', (192,192), (139,92,246,255))
img.save('$PROJ/assets/icon.png')
" 2>/dev/null || echo "no PIL"
          
          sed -i "s|android:label=\"[^\"]*\"|android:label=\"$APP\"|g" "$PROJ/android/app/src/main/AndroidManifest.xml" 2>/dev/null
          
          cd "$PROJ"
          flutter pub get
          flutter build apk --release
          
          mkdir -p ../output
          cp build/app/outputs/flutter-apk/app-release.apk ../output/
          
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          files: output/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
