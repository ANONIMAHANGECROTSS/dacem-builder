name: DACM Build APK

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'ZIP URL'
        required: true
        type: string
      project_name:
        description: 'Project Name'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: false
        type: string
        default: 'DACM App'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Download & Build
        run: |
          set -e
          curl -L -o src.zip "${{ github.event.inputs.source_url }}"
          unzip -o src.zip
          RAW="${{ github.event.inputs.project_name }}"
          APP="${{ github.event.inputs.app_name }}"
          PROJ=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr ' -' '_' | tr -cd 'a-z0-9_')
          
          # Cari folder hasil unzip (bisa nama asli atau nama sanitized)
          if [ -d "$RAW" ]; then
            mv "$RAW" _user
          elif [ -d "$PROJ" ]; then
            mv "$PROJ" _user
          else
            # Kalau zip flat (tanpa folder), buat folder _user dan pindahkan semua
            mkdir -p _user
            mv * .* _user/ 2>/dev/null || true
          fi
          
          flutter create --platforms=android --project-name "$PROJ" "$PROJ"
          
          # Hapus platform folder dari user source biar tidak conflict
          rm -rf _user/android _user/ios _user/linux _user/macos _user/windows _user/web 2>/dev/null || true
          
          # Copy konten user ke project baru (pakai /. biar hidden files ikut)
          if [ -d "_user" ]; then
            cp -r _user/. "$PROJ"/ 2>/dev/null || true
          fi
          rm -rf _user
          
          # Generate icon default kalau tidak ada
          mkdir -p "$PROJ/assets"
          if [ ! -f "$PROJ/assets/icon.png" ]; then
            python3 -c "from PIL import Image; Image.new('RGBA',(192,192),(139,92,246,255)).save('$PROJ/assets/icon.png')" 2>/dev/null || true
          fi
          
          # Tambahkan assets ke pubspec.yaml
          if ! grep -q "assets/icon.png" "$PROJ/pubspec.yaml"; then
            sed -i '/^flutter:/a\  assets:\n    - assets/icon.png' "$PROJ/pubspec.yaml"
          fi
          
          # FIX KUTIP: pakai single-quote + break out untuk variable expansion
          sed -i 's|android:label="[^"]*"|android:label="'"$APP"'"|g' "$PROJ/android/app/src/main/AndroidManifest.xml" 2>/dev/null || true
          
          cd "$PROJ"
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
