name: DACM Build APK

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'ZIP URL'
        required: true
        type: string
      project_name:
        description: 'Project Name'
        required: true
        type: string
      app_name:
        description: 'App Name'
        required: false
        type: string
        default: 'DACM App'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Download & Build
        run: |
          set -e
          
          # 1. Download & unzip
          curl -L -o src.zip "${{ github.event.inputs.source_url }}"
          unzip -o src.zip
          
          RAW="${{ github.event.inputs.project_name }}"
          APP="${{ github.event.inputs.app_name }}"
          PROJ=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | tr ' -' '_' | tr -cd 'a-z0-9_')
          [ -z "$PROJ" ] && PROJ="dacm_app"
          
          # 2. Pindahkan source user ke folder _user (handle ZIP bertingkat maupun flat)
          if [ -d "$RAW" ]; then
            mv "$RAW" _user
          elif [ -d "$PROJ" ]; then
            mv "$PROJ" _user
          else
            mkdir -p _user
            find . -maxdepth 1 \
              -not -name '_user' \
              -not -name 'src.zip' \
              -not -name '.' \
              -not -name '..' \
              -exec mv {} _user/ \;
          fi
          
          # 3. Buat project Flutter baru
          flutter create --platforms=android --project-name "$PROJ" "$PROJ"
          
          # 4. Hapus platform folder dari source user biar tidak conflict
          rm -rf _user/android _user/ios _user/linux _user/macos _user/windows _user/web 2>/dev/null || true
          
          # 5. Copy source user ke project baru
          if [ -d "_user" ]; then
            cp -r _user/. "$PROJ"/ 2>/dev/null || true
          fi
          rm -rf _user
          
          # 6. HANYA tambahkan asset ke pubspec KALAU file icon benar-benar ada
          if [ -f "$PROJ/assets/icon.png" ]; then
            echo "✅ Icon ditemukan, menambahkan ke pubspec..."
            python3 -c "
import sys
with open('$PROJ/pubspec.yaml', 'r') as f:
    content = f.read()

if 'assets/icon.png' not in content:
    if 'uses-material-design: true' in content:
        content = content.replace(
            'uses-material-design: true',
            'uses-material-design: true\n  assets:\n    - assets/icon.png'
        )
    elif 'flutter:' in content:
        content = content.replace(
            'flutter:\n',
            'flutter:\n  assets:\n    - assets/icon.png\n'
        )
    with open('$PROJ/pubspec.yaml', 'w') as f:
        f.write(content)
"
          else
            echo "ℹ️  Tidak ada assets/icon.png, melewati penambahan asset."
          fi
          
          # 7. Update app name di AndroidManifest
          sed -i 's|android:label="[^"]*"|android:label="'"$APP"'"|g' "$PROJ/android/app/src/main/AndroidManifest.xml" 2>/dev/null || true
          
          # 8. Build
          cd "$PROJ"
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
