name: 🚀 DACM Generate Flutter Project

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: '📁 Nama Project (tanpa spasi)'
        required: true
        default: 'my_app'
      package_name:
        description: '📦 Package Name (com.example.app)'
        required: true
        default: 'com.example.app'
      app_name:
        description: '📱 Nama Aplikasi'
        required: true
        default: 'My App'
      primary_color:
        description: '🎨 Warna (hex: 0xFF667EEA)'
        required: true
        default: '0xFF667EEA'

permissions: { contents: write }

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.3'

      - name: 🏗️ Create Project
        run: |
          flutter create --platforms=android --org "${{ github.event.inputs.package_name }}" "${{ github.event.inputs.project_name }}"
          cd "${{ github.event.inputs.project_name }}"
          
          # Hapus main.dart bawaan, ganti dengan template lu
          cat > lib/main.dart <<EOF
          import 'package:flutter/material.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ github.event.inputs.app_name }}',
                theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Color(${{ github.event.inputs.primary_color }}), useMaterial3: true)),
                home: Scaffold(
                  app_appBar: AppBar(title: Text('${{ github.event.inputs.app_name }}'), backgroundColor: Color(${{ github.event.inputs.primary_color }})),
                  body: const Center(child: Text('Build Success!', style: TextStyle(fontSize: 24))),
                ),
              );
            }
          }
          EOF

      - name: 📦 ZIP Project
        run: |
          zip -r "source_code.zip" "${{ github.event.inputs.project_name }}"

      - name: 🚀 Release Source
        uses: softprops/action-gh-release@v1
        with:
          tag_name: project-${{ github.run_number }}
          name: "📁 Source: ${{ github.event.inputs.app_name }}"
          files: "source_code.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
