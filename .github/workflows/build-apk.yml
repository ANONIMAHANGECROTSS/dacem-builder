name: 🚀 DACM Build APK from Source

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '📦 URL ZIP Source Project'
        required: true
        type: string
      project_name:
        description: '📁 Nama Project Folder (di dalam ZIP)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools && mv cmdline-tools-temp cmdline-tools/latest
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
      - name: Download & Extract
        run: |
          curl -L "${{ github.event.inputs.source_url }}" -o source.zip
          unzip -o source.zip
          cd "${{ github.event.inputs.project_name }}"
          flutter pub get
          
      - name: Build APK
        run: |
          cd "${{ github.event.inputs.project_name }}"
          flutter build apk --release
          
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "📱 ${{ github.event.inputs.project_name }} APK"
          files: "**/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
