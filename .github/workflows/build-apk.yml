name: 🚀 DACM Build APK (Bulletproof Version)

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '📦 URL ZIP Source (Direct Link)'
        required: true
        type: string

permissions: { contents: write }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.3'
          cache: true

      - name: 📥 Download & Extract Source
        run: |
          echo "Downloading from: ${{ github.event.inputs.source_url }}"
          curl -L "${{ github.event.inputs.source_url }}" -o source.zip
          
          # Validasi apakah file benar-benar ZIP
          if ! unzip -t source.zip > /dev/null 2>&1; then
            echo "❌ ERROR: URL yang lu kasih bukan file ZIP valid atau link salah!"
            echo "Isi file yang terdownload (9 byte tadi):"
            cat source.zip
            exit 1
          fi
          
          unzip source.zip -d extracted_project
          
          # AUTO-DETECT: Cari folder yang ada file pubspec.yaml
          PROJECT_ROOT=$(find extracted_project -name "pubspec.yaml" -exec dirname {} \;)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "❌ ERROR: File pubspec.yaml tidak ditemukan di dalam ZIP!"
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_ROOT" >> $GITHUB_ENV
          echo "Found project at: $PROJECT_ROOT"

      - name: 🤖 Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          export PATH="$PATH:$HOME/android-sdk/cmdline-tools/latest/bin"
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 🔨 Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter pub upgrade
          flutter build apk --release

      - name: 🚀 Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "📱 Build APK Result #${{ github.run_number }}"
          files: "${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
