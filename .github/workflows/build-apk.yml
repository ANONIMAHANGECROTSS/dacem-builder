name: "Build APK from Source"

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'ZIP URL Source'
        required: true
        type: string
      project_name:
        description: 'Project Folder Name'
        required: true
        type: string
      app_name:
        description: 'App Display Name'
        required: false
        type: string
        default: 'DACM App'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'
          cache: true
          
      - name: Download Source
        run: |
          curl -L -o source.zip "${{ github.event.inputs.source_url }}"
          unzip -o source.zip
          ls -la
          
      - name: Scaffold & Build
        id: scaffold
        run: |
          set -e
          RAW_PROJ="${{ github.event.inputs.project_name }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          PROJ=$(echo "$RAW_PROJ" | tr '[:upper:]' '[:lower:]' | tr ' -' '_' | tr -cd 'a-z0-9_')
          echo "proj=$PROJ" >> $GITHUB_OUTPUT
          
          if [ "$RAW_PROJ" != "$PROJ" ] && [ -d "$RAW_PROJ" ]; then
            mv "$RAW_PROJ" "$PROJ"
          fi
          
          mv "$PROJ" "${PROJ}_user"
          flutter create --platforms=android --project-name "$PROJ" "$PROJ"
          rm -rf "${PROJ}_user/android" "${PROJ}_user/ios" "${PROJ}_user/linux" "${PROJ}_user/macos" "${PROJ}_user/windows" "${PROJ}_user/web" 2>/dev/null || true
          cp -r "${PROJ}_user"/* "$PROJ"/ 2>/dev/null || true
          rm -rf "${PROJ}_user"
          
          # Fix assets
          mkdir -p "$PROJ/assets"
          if [ ! -f "$PROJ/assets/icon.png" ]; then
            python3 -c "
from PIL import Image
img = Image.new('RGBA', (192, 192), (139, 92, 246, 255))
img.save('$PROJ/assets/icon.png')
"
          fi
          
          # Fix pubspec
          if ! grep -q "assets/icon.png" "$PROJ/pubspec.yaml"; then
            sed -i '/^flutter:/a\  assets:\n    - assets/icon.png' "$PROJ/pubspec.yaml"
          fi
          
          # Inject app name
          sed -i "s|android:label=\"[^\"]*\"|android:label=\"$APP_NAME\"|g" "$PROJ/android/app/src/main/AndroidManifest.xml"
          
          # Inject icon to mipmap
          MIPMAP_DIR="$PROJ/android/app/src/main/res"
          mkdir -p "$MIPMAP_DIR"/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          for size in 48 72 96 144 192; do
            case $size in
              48) density="mdpi";;
              72) density="hdpi";;
              96) density="xhdpi";;
              144) density="xxhdpi";;
              192) density="xxxhdpi";;
            esac
            python3 -c "
from PIL import Image
img = Image.open('$PROJ/assets/icon.png')
img = img.resize((${size}, ${size}), Image.LANCZOS)
img.save('$MIPMAP_DIR/mipmap-${density}/ic_launcher.png')
" 2>/dev/null || cp "$PROJ/assets/icon.png" "$MIPMAP_DIR/mipmap-${density}/ic_launcher.png"
          done
          echo "Icons injected"
          
      - name: Build APK
        run: |
          cd "${{ steps.scaffold.outputs.proj }}"
          flutter pub get
          flutter build apk --release
          
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }}"
          files: "${{ steps.scaffold.outputs.proj }}/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
