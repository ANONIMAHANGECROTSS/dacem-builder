name: 🚀 DACM Build APK from Source

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '📦 URL ZIP Source Project'
        required: true
        type: string
      project_name:
        description: '📁 Nama Project Folder (di dalam ZIP)'
        required: true
        type: string

permissions: { contents: write }

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SOURCE_URL: ${{ github.event.inputs.source_url }}
      PROJ: ${{ github.event.inputs.project_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.24.3', cache: true }

      - name: 🤖 Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools && cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools cmdline-tools-temp
          mkdir -p cmdline-tools && mv cmdline-tools-temp cmdline-tools/latest
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          export PATH="$PATH:$HOME/android-sdk/cmdline-tools/latest/bin"
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 📥 Download & Extract Source
        run: |
          curl -L "$SOURCE_URL" -o source.zip
          unzip source.zip
          cd "$PROJ"
          flutter pub get

      - name: 🔨 Build APK
        run: |
          cd "$PROJ"
          flutter build apk --release

      - name: 🚀 Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "📱 $PROJ APK"
          files: "${PROJ}/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
