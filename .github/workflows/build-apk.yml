name: 🚀 DACM Build APK from Source

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '📦 URL ZIP Source Project'
        required: true
        type: string
      project_name:
        description: '📁 Nama Project Folder (di dalam ZIP)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'
          cache: true
          
      - name: Download & Extract Source
        run: |
          set -e
          echo "Downloading from: ${{ github.event.inputs.source_url }}"
          curl -L -o source.zip "${{ github.event.inputs.source_url }}"
          unzip -o source.zip
          ls -la
          
      - name: Get Dependencies
        run: |
          set -e
          cd "${{ github.event.inputs.project_name }}"
          flutter pub get
          
      - name: Build APK
        run: |
          set -e
          cd "${{ github.event.inputs.project_name }}"
          flutter build apk --release
          
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "📱 ${{ github.event.inputs.project_name }} APK"
          files: "${{ github.event.inputs.project_name }}/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
