name: 🚀 DACM Build APK from Source

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '📦 URL ZIP Source Project'
        required: true
        type: string
      project_name:
        description: '📁 Nama Project Folder (di dalam ZIP)'
        required: true
        type: string
      app_name:
        description: '📱 Nama Aplikasi (Display Name)'
        required: false
        type: string
        default: 'DACM App'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'
          cache: true
          
      - name: Download & Extract Source
        run: |
          set -e
          echo "Downloading from: ${{ github.event.inputs.source_url }}"
          curl -L -o source.zip "${{ github.event.inputs.source_url }}"
          unzip -o source.zip
          ls -la
          
      - name: Scaffold & Sanitize Project
        id: scaffold
        run: |
          set -e
          RAW_PROJ="${{ github.event.inputs.project_name }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          PROJ=$(echo "$RAW_PROJ" | tr '[:upper:]' '[:lower:]' | tr ' -' '_' | tr -cd 'a-z0-9_')
          
          echo "Original: $RAW_PROJ"
          echo "Sanitized: $PROJ"
          echo "App Name: $APP_NAME"
          echo "proj=$PROJ" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          
          if [ -z "$PROJ" ]; then
            echo "::error::Nama project tidak valid setelah sanitasi"
            exit 1
          fi
          
          if [ "$RAW_PROJ" != "$PROJ" ] && [ -d "$RAW_PROJ" ]; then
            mv "$RAW_PROJ" "$PROJ"
          fi
          
          echo "Backing up user source..."
          mv "$PROJ" "${PROJ}_user"
          
          echo "Generating fresh Flutter scaffold..."
          flutter create --platforms=android --project-name "$PROJ" "$PROJ"
          
          echo "Removing platform folders from user source..."
          rm -rf "${PROJ}_user/android" "${PROJ}_user/ios" "${PROJ}_user/linux" \
                 "${PROJ}_user/macos" "${PROJ}_user/windows" "${PROJ}_user/web" 2>/dev/null || true
          
          echo "Merging user code into scaffold..."
          rm -rf "$PROJ/lib"/*
          rm -f "$PROJ/pubspec.yaml"
          rm -rf "$PROJ/assets" 2>/dev/null || true
          rm -f "$PROJ/test"/* 2>/dev/null || true
          
          cp -r "${PROJ}_user"/* "$PROJ"/ 2>/dev/null || true
          rm -rf "${PROJ}_user"
          
          # ========== INJECT CUSTOM APP NAME ==========
          MANIFEST="$PROJ/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i "s|android:label=\"[^\"]*\"|android:label=\"$APP_NAME\"|g" "$MANIFEST"
            echo "✅ AndroidManifest.xml label updated to: $APP_NAME"
          fi
          
          # ========== INJECT CUSTOM ICON (VALIDATED) ==========
          USER_ICON="$PROJ/assets/icon.png"
          MIPMAP_DIR="$PROJ/android/app/src/main/res"
          
          mkdir -p "$MIPMAP_DIR/mipmap-mdpi" \
                   "$MIPMAP_DIR/mipmap-hdpi" \
                   "$MIPMAP_DIR/mipmap-xhdpi" \
                   "$MIPMAP_DIR/mipmap-xxhdpi" \
                   "$MIPMAP_DIR/mipmap-xxxhdpi"
          
          if [ -f "$USER_ICON" ]; then
            echo "✅ Custom icon found at assets/icon.png"
            # VALIDATE PNG: cek header PNG asli (89 50 4E 47)
            PNG_HEADER=$(xxd -l 4 -p "$USER_ICON")
            if [ "$PNG_HEADER" = "89504e47" ]; then
              echo "✅ Valid PNG file detected"
              # Resize ke berbagai density pake ImageMagick (paling aman)
              convert "$USER_ICON" -resize 48x48 "$MIPMAP_DIR/mipmap-mdpi/ic_launcher.png"
              convert "$USER_ICON" -resize 72x72 "$MIPMAP_DIR/mipmap-hdpi/ic_launcher.png"
              convert "$USER_ICON" -resize 96x96 "$MIPMAP_DIR/mipmap-xhdpi/ic_launcher.png"
              convert "$USER_ICON" -resize 144x144 "$MIPMAP_DIR/mipmap-xxhdpi/ic_launcher.png"
              convert "$USER_ICON" -resize 192x192 "$MIPMAP_DIR/mipmap-xxxhdpi/ic_launcher.png"
              echo "✅ Custom icon injected & resized to all densities"
            else
              echo "⚠️ INVALID PNG: header = $PNG_HEADER, using default Flutter icon"
              # Hapus mipmap biar Flutter regenerate default
              rm -rf "$MIPMAP_DIR/mipmap-"*
            fi
          else
            echo "⚠️ No custom icon found at assets/icon.png, using default Flutter icon"
          fi
          
          echo "Final structure:"
          ls -la "$PROJ"
          ls -la "$PROJ/android/app/src/main/res/mipmap-mdpi/" 2>/dev/null || echo "No mipmap-mdpi"
          
      - name: Get Dependencies
        run: |
          set -e
          cd "${{ steps.scaffold.outputs.proj }}"
          flutter pub get
          
      - name: Build APK
        run: |
          set -e
          cd "${{ steps.scaffold.outputs.proj }}"
          flutter build apk --release
          
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "📱 ${{ github.event.inputs.app_name }} - Build #${{ github.run_number }}"
          files: "${{ steps.scaffold.outputs.proj }}/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
