name: 🚀 DACM Build APK Engine

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: '📦 URL ZIP Source'
        required: true
        type: string
      project_name:
        description: '📁 Nama Project'
        required: true
        type: string

permissions: { contents: write }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.24.3' }

      - name: 📥 Download & Auto-Fix Structure
        run: |
          # Download dengan timeout dan retry
          curl -L -o source.zip "${{ github.event.inputs.source_url }}"
          
          # Cek validitas zip
          if ! unzip -t source.zip; then echo "❌ INVALID ZIP FILE"; exit 1; fi
          
          unzip source.zip -d raw_extract
          
          # Cari di mana letak pubspec.yaml (Auto-Fixer)
          REAL_PATH=$(find raw_extract -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          
          if [ -z "$REAL_PATH" ]; then echo "❌ PUBSPEC NOT FOUND"; exit 1; fi
          
          # Pindahin ke folder kerja bersih
          mkdir project_workdir
          cp -r "$REAL_PATH"/* project_workdir/
          echo "WORK_DIR=project_workdir" >> $GITHUB_ENV

      - name: 🤖 Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          export PATH="$PATH:$HOME/android-sdk/cmdline-tools/latest/bin"
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 🔨 Build Release APK
        run: |
          cd ${{ env.WORK_DIR }}
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 🚀 Create Release (Download Link)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: "📱 APK Result #${{ github.run_number }}"
          files: "${{ env.WORK_DIR }}/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
